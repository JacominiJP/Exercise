<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login Page">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    
<div class="backcolor login">


     <div class="insidelogin">
        <div class="namepage">
            
            <h1>Login</h1>

        </div>

        <div class="informations">
            
        <div class="insertemail">
            <label for="name">Email:</label>
            <input type="email" id="name" placeholder="seuemail@gmail.com">
        </div>   
        
        <div class="insertpassword">
            <label for="password">Senha:</label>
            <input type="password" id="password" placeholder="12345@#!">
        </div>

        </div>

        <div class="plus">

            <div class="lembre">
                <input type="checkbox">
                <p>Lembre-me</p>
            </div>

            <div class="link">
                <a class="hiperlink" href="#" rel="next"> Esqueci minha Senha </a>
            </div>

        </div>
     </div>
</div>

</body>

</html>
