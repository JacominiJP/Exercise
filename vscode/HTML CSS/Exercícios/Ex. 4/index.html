<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login Page">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    
<div class="login">

     <div class="insidelogin">
        <div class="namepage">
            
            <h1>Login</h1>

        </div>

        <div class="informations">

            <label for="name">Nome:</label>
            <input type="email" id="name" placeholder="seuemail@gmail.com">
            <label for="password">Senha:</label>
            <input type="email" id="password" placeholder="12345@#!">

        </div>

        <div class="plus">
            <input type="checkbox">
            <p>Lembre-me</p>
            <a href="#" rel="next"> Esqueci minha Senha </a>
        </div>
     </div>
</div>

</body>

</html>
